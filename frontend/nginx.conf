# ─────────────────────────────────────────────────────────────────────────────
# InvenIQ — Nginx Production Config
# Serves React SPA + proxies /api/* to FastAPI backend
# ─────────────────────────────────────────────────────────────────────────────
worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" $request_time';
    access_log /var/log/nginx/access.log main;

    # ── Performance ──────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    server_tokens   off;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_proxied    any;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/json application/xml
        image/svg+xml font/woff2;

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # ── Security headers ─────────────────────────────────────────────────
        add_header X-Content-Type-Options  "nosniff"          always;
        add_header X-Frame-Options         "SAMEORIGIN"       always;
        add_header X-XSS-Protection        "1; mode=block"    always;
        add_header Referrer-Policy         "strict-origin"    always;

        # ── Static assets: 1-year cache (CRA content-hashes filenames) ───────
        location /static/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ── manifest.json & sw.js: no cache (PWA must always check) ─────────
        location ~* ^/(manifest\.json|sw\.js)$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
        }

        # ── API proxy → FastAPI backend ───────────────────────────────────────
        location /api/ {
            proxy_pass         http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            # SSE (AI chat streaming) — never buffer, long timeout
            proxy_buffering        off;
            proxy_cache            off;
            proxy_read_timeout     120s;
            proxy_connect_timeout  10s;
            chunked_transfer_encoding on;
        }

        # ── React SPA — all routes fall back to index.html ───────────────────
        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache";
        }
    }
}
